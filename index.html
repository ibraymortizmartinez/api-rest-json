<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DinoScanner Pro | Dashboard</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/2972/2972185.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="d-flex flex-column min-vh-100">

    <nav class="navbar navbar-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="#">
                <span class="fs-4 fw-bold">🦖 Dino<span class="text-success">Explorer</span></span>
            </a>
            <div class="text-white-50 small">
                Programador: <span class="text-white fw-bold">Tu Nombre Completo</span>
            </div>
        </div>
    </nav>

    <main class="container my-5 flex-grow-1">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <div class="main-card card">
                    <div class="card-header-custom d-flex justify-content-between align-items-center">
                        <h5 class="m-0 fw-bold text-dark">Panel de Consulta</h5>
                        <div class="d-flex align-items-center">
                            <span class="me-2 text-muted small">Status de Red:</span>
                            <span id="client-ip" class="badge rounded-pill bg-success text-white shadow-sm">Detectando...</span>
                        </div>
                    </div>
                    
                    <div class="card-body p-4 p-md-5">
                        <div class="row g-4 align-items-end mb-4">
                            <div class="col-md-8">
                                <label class="form-label fw-600 text-muted">Período Geológico</label>
                                <select class="form-select shadow-sm" id="era-select">
                                    <option value="" selected disabled>Selecciona una era para analizar...</option>
                                    <option value="Cretaceous">Cretáceo (Mesozoico Tardío)</option>
                                    <option value="Jurassic">Jurásico (Era de los Gigantes)</option>
                                    <option value="Triassic">Triásico (Aparición)</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <button class="btn btn-primary-custom w-100 shadow-sm" id="scan-btn">
                                    Ejecutar Consulta API
                                </button>
                            </div>
                        </div>

                        <div class="d-flex align-items-center mb-3">
                            <div class="flex-grow-1 border-bottom"></div>
                            <span class="mx-3 text-muted small fw-bold">SALIDA DE DATOS JSON</span>
                            <div class="flex-grow-1 border-bottom"></div>
                        </div>

                        <div id="result-container" class="overflow-auto custom-scrollbar" style="height: 400px;">
                            <div class="text-center py-5">
                                <p class="text-muted">Esperando parámetros de entrada...</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="py-4">
        <div class="container text-center">
            <p class="mb-0 small fw-bold">PROYECTO DESARROLLO WEB PROFESIONAL</p>
            <div class="small opacity-50">Tecnologías: JS Vanilla (OOP) • Bootstrap 5 • RapidAPI</div>
        </div>
    </footer>

    <script type="module" src="assets/js/main.js"></script>
</body>
</html>
