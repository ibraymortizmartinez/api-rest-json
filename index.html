<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DinoScanner Pro | NEO-DASHBOARD</title>
    <link rel="icon" href="./assets/img/fosil.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto+Mono&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="icon" type="image/png" href="./assets/img/fosil.png">
</head>
<body class="d-flex flex-column min-vh-100">

    <nav class="navbar navbar-dark shadow">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="#">
                <span class="fs-4 fw-bold">Dino<span style="color:var(--neon-magenta)">Explorer</span>.EXE</span>
            </a>
            <div class="text-white-50 small font-monospace">
                OPERATOR: <span class="text-white fw-bold">ANGEL IBRAYM ORTIZ MARTINEZ</span>
            </div>
        </div>
    </nav>

    <main class="container my-5 flex-grow-1">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <div class="main-card card">
                    <div class="card-header-custom d-flex justify-content-between align-items-center">
                        <h5 class="m-0 fw-bold" style="color:var(--text-main)">>_ PANEL_DE_CONTROL</h5>
                        <div class="d-flex align-items-center font-monospace small">
                            <span class="me-2 text-muted">RED_STATUS:</span>
                            <span id="client-ip" class="badge rounded-pill bg-transparent">DETECTANDO...</span>
                        </div>
                    </div>
                    
                    <div class="card-body p-4 p-md-5">
                        <div class="row g-4 align-items-end mb-4">
                            <div class="col-md-8">
                                <label class="form-label fw-bold small" style="color:var(--neon-cyan)">[ SELECCIONAR_ERA_GEOLOGICA ]</label>
                                <select class="form-select shadow-sm" id="era-select">
                                    <option value="" selected disabled>Elija un período de tiempo...</option>
                                    <option value="Cretaceous">Cretácico (Mesozoico Tardío)</option>
                                    <option value="Jurassic">Jurásico (Era de Gigantes)</option>
                                    <option value="Triassic">Triásico (Aparición)</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <button class="btn btn-primary-custom w-100 shadow" id="scan-btn">
                                    INICIAR_ESCANEO
                                </button>
                            </div>
                        </div>

                        <div class="d-flex align-items-center mb-3">
                            <div class="flex-grow-1 border-bottom" style="border-color: rgba(255,0,255,0.2) !important"></div>
                            <span class="mx-3 text-muted small fw-bold font-monospace">[ SALIDA_DATOS_JSON ]</span>
                            <div class="flex-grow-1 border-bottom" style="border-color: rgba(255,0,255,0.2) !important"></div>
                        </div>

                        <div id="result-container" class="overflow-auto custom-scrollbar" style="height: 400px;">
                            <div class="text-center py-5">
                                <p class="text-muted font-monospace">Esperando parámetros de entrada para iniciar secuencia de escaneo...</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="py-4 font-monospace">
        <div class="container text-center">
            <p class="mb-0 small fw-bold text-uppercase">PROYECTO: ANALIZADOR PALEONTOLOGICO DIGITAL.</p>
            <div class="small opacity-50">SISTEMA: JS Vanilla (OOP) • Bootstrap 5 • RapidAPI Core</div>
        </div>
    </footer>

    <script type="module" src="assets/js/main.js"></script>
</body>
</html>
